name: Build Android APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Capacitor Sync
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Inject Android Permissions Automatically
        run: |
          node -e "
          const fs = require('fs');
          const file = 'android/app/src/main/AndroidManifest.xml';
          let data = fs.readFileSync(file, 'utf8');
          const perms = \`
          <uses-permission android:name=\"android.permission.INTERNET\" />
          <uses-permission android:name=\"android.permission.ACCESS_NETWORK_STATE\" />
          <uses-permission android:name=\"android.permission.CAMERA\" />
          <uses-permission android:name=\"android.permission.RECORD_AUDIO\" />
          <uses-permission android:name=\"android.permission.MODIFY_AUDIO_SETTINGS\" />
          <uses-permission android:name=\"android.permission.ACCESS_WIFI_STATE\" />
          <uses-permission android:name=\"android.permission.CHANGE_WIFI_STATE\" />
          <uses-permission android:name=\"android.permission.ACCESS_FINE_LOCATION\" />
          <uses-permission android:name=\"android.permission.ACCESS_COARSE_LOCATION\" />
          <uses-permission android:name=\"android.permission.NEARBY_WIFI_DEVICES\" />
          <uses-permission android:name=\"android.permission.BLUETOOTH\" />
          <uses-permission android:name=\"android.permission.BLUETOOTH_ADMIN\" />
          <uses-permission android:name=\"android.permission.BLUETOOTH_SCAN\" />
          <uses-permission android:name=\"android.permission.BLUETOOTH_CONNECT\" />
          <uses-permission android:name=\"android.permission.READ_EXTERNAL_STORAGE\" />
          <uses-permission android:name=\"android.permission.WRITE_EXTERNAL_STORAGE\" />
          <uses-permission android:name=\"android.permission.READ_MEDIA_IMAGES\" />
          <uses-permission android:name=\"android.permission.WAKE_LOCK\" />
          <uses-permission android:name=\"android.permission.FOREGROUND_SERVICE\" />
          <uses-permission android:name=\"android.permission.POST_NOTIFICATIONS\" />
          \`;
          data = data.replace('</manifest>', perms + '</manifest>');
          fs.writeFileSync(file, data);
          console.log('Permissions Injected Successfully!');
          "

      - name: Build APK (Debug for direct phone install)
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Upload Air Talk APK
        uses: actions/upload-artifact@v3
        with:
          name: AirTalk-App-Ready
          path: android/app/build/outputs/apk/debug/app-debug.apk